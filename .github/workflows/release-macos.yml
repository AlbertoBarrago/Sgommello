name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve packages
        run: swift package resolve

      - name: Create signed DMG
        run: ./scripts/release.sh "${{ steps.version.outputs.version }}"

      - name: Verify app signature
        run: |
          APP_PATH="dist/Sgommello.app"
          codesign --verify --deep --strict "$APP_PATH"
          codesign --display --verbose=4 "$APP_PATH"

      - name: Generate changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { in_section = 1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md > changelog_section.md
          if [ -s changelog_section.md ]; then
            cat changelog_section.md >> release_notes.md
          elif [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" --no-merges >> release_notes.md
          else
            git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges >> release_notes.md
          fi
          echo "" >> release_notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" >> release_notes.md

      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION=2.9.3
          curl -fsSL -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p sparkle-tools
          tar -xJf sparkle.tar.xz -C sparkle-tools

      - name: Generate signed appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          DMG_NAME="Sgommello-${VERSION}.dmg"
          test -f "dist/${DMG_NAME}"
          test -n "$SPARKLE_ED_PRIVATE_KEY"
          mkdir -p appcast-work
          cp "dist/${DMG_NAME}" appcast-work/
          {
            echo "<h2>What's Changed</h2><ul>"
            tail -n +3 release_notes.md | grep '^- ' \
              | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g' \
                    -e 's/^- \(.*\)$/<li>\1<\/li>/'
            echo "</ul>"
          } > "appcast-work/Sgommello-${VERSION}.html"
          echo "$SPARKLE_ED_PRIVATE_KEY" | ./sparkle-tools/bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${TAG}/" \
            --link "https://github.com/${{ github.repository }}" \
            --embed-release-notes \
            --maximum-versions 1 \
            -o appcast.xml \
            appcast-work
          cat appcast.xml

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="Sgommello-${VERSION}.dmg"
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" "dist/${DMG_NAME}" appcast.xml --clobber
          else
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes-file release_notes.md \
              "dist/${DMG_NAME}" \
              appcast.xml
          fi
